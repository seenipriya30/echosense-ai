services:
  - type: web
    name: echosense-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c 'uvicorn api:app --host 0.0.0.0 --port ${PORT:-10000}'
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false